<!DOCTYPE html>
<html>
<head>
  <title>Expense</title>
</head>
<body>
  <h2>บันทึกรายจ่าย</h2>
  <input type="text" id="text" placeholder="เช่น ข้าว 50">
  <button onclick="send()">บันทึก</button>

  <script>
    function send() {
      const text = document.getElementById("text").value;

      fetch("https://script.google.com/macros/s/AKfycbz6fvBwLT7aoEylDGl44UZTE6aWnofV3KCKcookYLDE8E8j6Syc3JOt67_7rBKf25VFWA/exec", {
        method: "POST",
        body: JSON.stringify({ text: text })
      }).then(() => alert("บันทึกแล้ว"));
    }
  </script>
</body>
</html>
