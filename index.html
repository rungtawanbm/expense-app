<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Expense</title>
</head>
<body>
  <h2>บันทึกรายจ่าย</h2>

  <input type="text" id="text" placeholder="เช่น ข้าว 50">
  <br><br>

  <button onclick="send()">บันทึก</button>

  <script>
    function send() {
      const text = document.getElementById("text").value;

      fetch("https://script.google.com/macros/s/AKfycbx0D1Hm2vz8rYLx_Q7CeBLN-kvrv2QhnVZ6K4L8cOZbMEtm1iUyus6m9rkortXSwfr6zw/exec", {
        method: "POST",
        body: JSON.stringify({ text: text })
      })
      .then(() => {
        alert("บันทึกแล้ว");
        document.getElementById("text").value = "";
      });
    }
  </script>
</body>
</html>
